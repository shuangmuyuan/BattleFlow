services:
  battleflow:
    build:
      context: .
    container_name: battleflow
    restart: unless-stopped
    environment:
      COZE_PROJECT_ENV: PROD
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      DEPLOY_RUN_PORT: "5001"
      PORT: "5001"
      COZE_WORKSPACE_PATH: /app
      SKILL_REGISTRY_DIR: /app/data/skill-registry
      WORKFLOW_REGISTRY_DIR: /app/data/workflows
      BATTLEFLOW_DATABASE_URL: "postgresql://battleflow:${BATTLEFLOW_POSTGRES_PASSWORD:?BATTLEFLOW_POSTGRES_PASSWORD is required}@postgres:5432/battleflow"
      BATTLEFLOW_DATABASE_SSL: "disable"
      BATTLEFLOW_AUTH_SECRET: "${BATTLEFLOW_AUTH_SECRET:?BATTLEFLOW_AUTH_SECRET is required}"
      SSO_ENABLED: "${SSO_ENABLED:-true}"
      SSO_BASE_URL: "${SSO_BASE_URL:-https://idtrust.atrust.sangfor.com}"
      SSO_CLIENT_ID: "${SSO_CLIENT_ID:?SSO_CLIENT_ID is required}"
      SSO_CLIENT_SECRET: "${SSO_CLIENT_SECRET:?SSO_CLIENT_SECRET is required}"
      SSO_REDIRECT_URI: "${SSO_REDIRECT_URI:-https://battleflow.atrust.sangfor.com/auth/callback}"
      SSO_SCOPE: "${SSO_SCOPE:-get_user_info}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:?ANTHROPIC_BASE_URL is required}"
      ANTHROPIC_AUTH_TOKEN: "${ANTHROPIC_AUTH_TOKEN:?ANTHROPIC_AUTH_TOKEN is required}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      ANTHROPIC_DEFAULT_HAIKU_MODEL: "${ANTHROPIC_DEFAULT_HAIKU_MODEL:-claude-haiku-4-5}"
      ANTHROPIC_DEFAULT_SONNET_MODEL: "${ANTHROPIC_DEFAULT_SONNET_MODEL:-claude-sonnet-4-6}"
      ANTHROPIC_DEFAULT_OPUS_MODEL: "${ANTHROPIC_DEFAULT_OPUS_MODEL:-claude-opus-4-7}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
    expose:
      - "5001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - battleflow-data:/app/data

  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: battleflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: battleflow
      POSTGRES_USER: battleflow
      POSTGRES_PASSWORD: "${BATTLEFLOW_POSTGRES_PASSWORD:?BATTLEFLOW_POSTGRES_PASSWORD is required}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battleflow -d battleflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - battleflow-postgres-data:/var/lib/postgresql/data

  nginx:
    image: public.ecr.aws/docker/library/nginx:1.27-alpine
    container_name: battleflow-nginx
    restart: unless-stopped
    depends_on:
      - battleflow
    ports:
      - "5001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  battleflow-data:
  battleflow-postgres-data:
